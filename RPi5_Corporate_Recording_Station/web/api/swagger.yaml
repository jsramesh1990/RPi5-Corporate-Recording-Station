  # ============================================
  # HARDWARE ENDPOINTS
  # ============================================
  
  /hardware/status:
    get:
      tags:
        - Hardware
      summary: Get hardware status
      description: Returns GPIO, UART, camera, and audio status
      operationId: getHardwareStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Hardware status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HardwareStatus'
  
  /hardware/gpio:
    get:
      tags:
        - Hardware
      summary: Get GPIO status
      description: Returns all GPIO pin states
      operationId: getGPIOStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: GPIO status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  pins:
                    type: array
                    items:
                      type: object
                      properties:
                        pin:
                          type: integer
                        name:
                          type: string
                        value:
                          type: boolean
                        direction:
                          type: string
                        pull:
                          type: string
                        interrupt:
                          type: boolean
  
  /hardware/gpio/{pin}:
    get:
      tags:
        - Hardware
      summary: Get GPIO pin state
      description: Returns state of a specific GPIO pin
      operationId: getGPIOPin
      security:
        - bearerAuth: []
      parameters:
        - name: pin
          in: path
          required: true
          schema:
            type: integer
          description: GPIO pin number
      responses:
        '200':
          description: GPIO pin state retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  pin:
                    type: integer
                  value:
                    type: boolean
                  direction:
                    type: string
                  pull:
                    type: string
    
    post:
      tags:
        - Hardware
      summary: Set GPIO pin
      description: Sets the state of a GPIO pin
      operationId: setGPIOPin
      security:
        - bearerAuth: []
      parameters:
        - name: pin
          in: path
          required: true
          schema:
            type: integer
          description: GPIO pin number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: boolean
                  description: Pin value
                direction:
                  type: string
                  enum: [in, out]
                  description: Pin direction
              required:
                - value
      responses:
        '200':
          description: GPIO pin updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid pin or value

  # ============================================
  # HEALTH ENDPOINTS
  # ============================================
  
  /health:
    get:
      tags:
        - Health
