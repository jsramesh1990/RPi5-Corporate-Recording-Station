          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  
  /health/live:
    get:
      tags:
        - Health
      summary: Liveness check
      description: Returns if the service is alive
      operationId: livenessCheck
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive
                  timestamp:
                    type: string
                    format: date-time
  
  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Returns if the service is ready to accept requests
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  checks:
                    type: object
                    properties:
                      recording:
                        type: string
                      storage:
                        type: string
                      cloud:
                        type: string

