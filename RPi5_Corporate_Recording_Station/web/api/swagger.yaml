                      type: object
                      properties:
                        ssid:
                          type: string
                        signal:
                          type: integer
                        security:
                          type: string
                        channel:
                          type: integer
  
  /network/wifi/connect:
    post:
      tags:
        - Network
      summary: Connect to WiFi
