# ============================================================
# RPi5 Corporate Recording Station - Logging Configuration
# ============================================================

# ============================================================
# GLOBAL SETTINGS
# ============================================================

# Default log level
# Levels: TRACE, DEBUG, INFO, WARN, ERROR, FATAL
global.log_level=INFO

# Log format
# Variables: %Y=year, %m=month, %d=day, %H=hour, %M=minute, %S=second
#           %f=microseconds, %l=level, %n=name, %v=message
global.log_format=%Y-%m-%d %H:%M:%S.%f [%l] %n: %v

# Timezone
global.timezone=UTC

# ============================================================
# CONSOLE LOGGING
# ============================================================

# Console output settings
console.enabled=true
console.log_level=INFO
console.color.enabled=true

# Color mapping
console.color.level_TRACE=cyan
console.color.level_DEBUG=blue
console.color.level_INFO=green
console.color.level_WARN=yellow
console.color.level_ERROR=red
console.color.level_FATAL=red,bold

# Console format
console.format=%Y-%m-%d %H:%M:%S [%l] %v

# ============================================================
# FILE LOGGING
# ============================================================

# File output settings
file.enabled=true
file.log_level=DEBUG
file.path=/var/log/recording-station/recording-station.log
file.format=%Y-%m-%d %H:%M:%S.%f [%l] %n: %v

# File rotation
file.rotation.enabled=true
file.rotation.max_size=10485760  # 10 MB
file.rotation.max_files=5
file.rotation.type=size  # size, time, both

# Time-based rotation
file.rotation.time=midnight
file.rotation.day=0  # 0=Sunday
file.rotation.hour=0
file.rotation.minute=0

# Compression
file.compression.enabled=true
file.compression.algorithm=gzip
file.compression.level=6

# ============================================================
# SYSLOG LOGGING
# ============================================================

# Syslog output settings
syslog.enabled=false
syslog.log_level=INFO
syslog.ident=recording-station
syslog.facility=local0
syslog.host=localhost
syslog.port=514
syslog.protocol=udp  # udp, tcp
syslog.format=rfc5424  # rfc3164, rfc5424

# ============================================================
# JSON LOGGING
# ============================================================

# JSON output for machine parsing
json.enabled=false
json.log_level=INFO
json.path=/var/log/recording-station/recording-station.json
json.pretty=false
json.rotation.enabled=true
json.rotation.max_size=10485760
json.rotation.max_files=5

# ============================================================
# COMPONENT-SPECIFIC LOGGING
# ============================================================

# Core components
core.log_level=INFO
core.hardware.log_level=WARN
core.memory.log_level=INFO
core.storage.log_level=INFO
core.storage.scan.log_level=DEBUG

# Recording components
recording.log_level=INFO
recording.video.log_level=DEBUG
recording.audio.log_level=DEBUG
recording.encoder.log_level=DEBUG
recording.buffer.log_level=DEBUG

# Cloud components
cloud.log_level=INFO
cloud.upload.log_level=INFO
cloud.sync.log_level=DEBUG
cloud.provider.nextcloud.log_level=INFO
cloud.provider.onedrive.log_level=INFO
cloud.provider.s3.log_level=INFO

# UI components
ui.log_level=INFO
ui.web.log_level=INFO
ui.dashboard.log_level=INFO
ui.websocket.log_level=WARN
ui.console.log_level=DEBUG

# Network components
network.log_level=INFO
network.uart.log_level=INFO
network.websocket.log_level=WARN
network.tcp.log_level=DEBUG
network.http.log_level=DEBUG

# ============================================================
# PERFORMANCE LOGGING
# ============================================================

performance.enabled=true
performance.interval=60  # seconds
performance.log_level=INFO

# Metrics to log
performance.include_cpu=true
performance.include_memory=true
performance.include_disk=true
performance.include_network=true
performance.include_process=true
performance.include_gpio=false

# Performance thresholds
performance.warning.cpu=80  # percentage
performance.warning.memory=80  # percentage
performance.warning.disk=85  # percentage
performance.warning.temp=70  # Celsius

# ============================================================
# AUDIT LOGGING
# ============================================================

# Security audit logging
audit.enabled=true
audit.log_level=INFO
audit.path=/var/log/recording-station/audit.log
audit.format=json

# What to audit
audit.include_commands=true
audit.include_login=true
audit.include_logout=true
audit.include_file_access=true
audit.include_file_modification=true
audit.include_file_deletion=true
audit.include_config_changes=true
audit.include_system_events=true
audit.include_cloud_operations=true

# Audit retention
audit.retention.days=365
audit.retention.max_files=100

# ============================================================
# ERROR LOGGING
# ============================================================

# Error-specific settings
error.enabled=true
error.log_level=ERROR
error.path=/var/log/recording-station/error.log
error.format=%Y-%m-%d %H:%M:%S [%l] %n: %v

# Include backtrace
error.backtrace.enabled=true
error.backtrace.max_frames=50
error.backtrace.symbolize=true

# Error aggregation
error.aggregation.enabled=true
error.aggregation.interval=60  # seconds
error.aggregation.max_reports=100

# ============================================================
# REMOTE LOGGING
# ============================================================

# Remote logging to central server
remote.enabled=false
remote.host=logs.example.com
remote.port=514
remote.protocol=tcp
remote.format=syslog
remote.ident=recording-station
remote.ssl.enabled=false
remote.ssl.cert=
remote.ssl.key=

# ============================================================
# EMAIL LOGGING
# ============================================================

# Email notifications for critical logs
email.enabled=false
email.log_level=ERROR
email.recipients=admin@example.com
email.throttle.enabled=true
email.throttle.interval=300  # seconds
email.throttle.max=10

# ============================================================
# LOG ROTATION AND CLEANUP
# ============================================================

# Global rotation settings
rotation.global.enabled=true
rotation.global.max_age=30  # days
rotation.global.max_size=1073741824  # 1 GB

# Cleanup schedule
cleanup.enabled=true
cleanup.interval=86400  # 24 hours
cleanup.keep_latest=10

# ============================================================
# DEVELOPMENT LOGGING
# ============================================================

# Development-specific settings
dev.enabled=false
dev.log_level=TRACE
dev.console.verbose=true
dev.file.verbose=true

# Trace logging
trace.enabled=false
trace.log_level=TRACE
trace.path=/var/log/recording-station/trace.log
trace.include_time=true
trace.include_file=true
trace.include_line=true
trace.include_function=true

# ============================================================
# END OF LOGGING CONFIGURATION
# ============================================================
