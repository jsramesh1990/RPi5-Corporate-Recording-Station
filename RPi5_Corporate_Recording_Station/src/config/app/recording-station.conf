# ============================================================
# RPi5 Corporate Recording Station - Main Configuration
# ============================================================
# Format: KEY=VALUE
# Comments start with #
# Strings with spaces should be quoted

# ============================================================
# SYSTEM SETTINGS
# ============================================================

# System identification
SYSTEM_NAME="Recording Station"
SYSTEM_HOSTNAME=recording-station
SYSTEM_TIMEZONE=UTC

# Data directories
DATA_DIR=/var/lib/recording-station
RECORDINGS_DIR=/var/lib/recording-station/recordings
ARCHIVE_DIR=/var/lib/recording-station/archive
TEMP_DIR=/var/lib/recording-station/temp
METADATA_DIR=/var/lib/recording-station/metadata
CONFIG_DIR=/etc/recording-station

# Log directory
LOG_DIR=/var/log/recording-station
LOG_LEVEL=info
LOG_FORMAT="%Y-%m-%d %H:%M:%S.%f [%l] %n: %v"
LOG_FILE=recording-station.log
LOG_MAX_SIZE=10485760  # 10 MB
LOG_MAX_FILES=5

# ============================================================
# RECORDING SETTINGS
# ============================================================

# Video settings
VIDEO_ENABLED=true
VIDEO_WIDTH=1920
VIDEO_HEIGHT=1080
VIDEO_FRAMERATE=30
VIDEO_BITRATE=4000000  # 4 Mbps
VIDEO_CODEC=h264       # h264, h265, mjpeg
VIDEO_FORMAT=mp4       # mp4, mkv, avi
VIDEO_QUALITY=high     # low, medium, high, ultra

# Audio settings
AUDIO_ENABLED=true
AUDIO_SAMPLE_RATE=48000
AUDIO_CHANNELS=2
AUDIO_BITRATE=128000   # 128 Kbps
AUDIO_CODEC=aac        # aac, mp3, opus
AUDIO_FORMAT=wav       # wav, mp3, flac, aac
AUDIO_QUALITY=high     # low, medium, high

# Recording limits
MAX_RECORDING_TIME=3600  # seconds (1 hour)
MAX_FILE_SIZE=4000000000  # 4 GB
MIN_FREE_SPACE=10737418240  # 10 GB
AUTO_RECORD=false
AUTO_STOP=true
RECORDING_PREVIEW=true

# Filename format
FILENAME_FORMAT="{date}_{time}_{type}"  # {date}, {time}, {type}, {id}, {custom}
FILENAME_PREFIX=recording
FILENAME_SUFFIX=""

# Recording schedule
SCHEDULE_ENABLED=false
SCHEDULE_START="09:00"
SCHEDULE_END="17:00"
SCHEDULE_DAYS="1,2,3,4,5"  # 0=Sunday, 1=Monday, etc.

# ============================================================
# HARDWARE SETTINGS
# ============================================================

# Camera settings
CAMERA_ENABLED=true
CAMERA_DEVICE=/dev/video0
CAMERA_INTERFACE=csi  # csi, usb, hdmi
CAMERA_MODEL="Raspberry Pi Camera Module 3"
CAMERA_OPTIONS=""

# Audio settings
AUDIO_INTERFACE=alsa  # alsa, pulse
AUDIO_DEVICE=hw:0,0
AUDIO_INPUT_NAME="USB Audio Device"
AUDIO_OPTIONS=""

# UART settings
UART_ENABLED=true
UART_DEVICE=/dev/ttyAMA0
UART_BAUD=115200
UART_DATA_BITS=8
UART_STOP_BITS=1
UART_PARITY=none
UART_FLOW_CONTROL=false
UART_TIMEOUT=1000  # milliseconds

# GPIO settings
GPIO_ENABLED=true
GPIO_SYSTEM_LED=17
GPIO_RECORDING_LED=27
GPIO_START_BUTTON=22
GPIO_STOP_BUTTON=23
GPIO_ERROR_LED=24
GPIO_STATUS_LED=25
GPIO_DEBOUNCE=50  # milliseconds
GPIO_INVERT_BUTTONS=true

# PCIe/NVMe settings
PCIe_ENABLED=true
NVME_DEVICE=/dev/nvme0n1
NVME_MOUNT_POINT=/mnt/nvme
NVME_AUTO_MOUNT=true
NVME_FILESYSTEM=ext4

# I2C settings
I2C_ENABLED=true
I2C_BUS=1
I2C_SPEED=100000  # Hz

# SPI settings
SPI_ENABLED=true
SPI_BUS=0
SPI_SPEED=1000000  # Hz
SPI_MODE=0

# ============================================================
# STORAGE SETTINGS
# ============================================================

# Storage monitoring
STORAGE_WARNING_LEVEL=85  # percentage
STORAGE_CRITICAL_LEVEL=95  # percentage
STORAGE_SCAN_INTERVAL=60  # seconds
STORAGE_AUTO_CLEANUP=false
STORAGE_CLEANUP_AGE=30  # days

# Archive settings
ARCHIVE_ENABLED=true
ARCHIVE_COMPRESSION=gzip  # gzip, bzip2, none
ARCHIVE_COMPRESSION_LEVEL=6
ARCHIVE_ENCRYPTION=false
ARCHIVE_ENCRYPTION_KEY=""

# File retention
RETENTION_ENABLED=false
RETENTION_DAYS=90
RETENTION_POLICY=delete  # delete, archive, compress

# ============================================================
# CLOUD SETTINGS
# ============================================================

# General cloud settings
CLOUD_ENABLED=true
CLOUD_AUTO_UPLOAD=true
CLOUD_PROVIDER=nextcloud  # nextcloud, onedrive, s3, webdav
CLOUD_RETRY_COUNT=3
CLOUD_RETRY_DELAY=5  # seconds
CLOUD_TIMEOUT=300  # seconds
CLOUD_BANDWIDTH_LIMIT=0  # bytes per second (0 = unlimited)
CLOUD_CONCURRENT_UPLOADS=3

# Nextcloud settings
NEXTCLOUD_URL=https://nextcloud.example.com
NEXTCLOUD_USERNAME=recording_station
NEXTCLOUD_PASSWORD=
NEXTCLOUD_PATH=/Recordings
NEXTCLOUD_VERIFY_SSL=true
NEXTCLOUD_CHUNK_SIZE=10485760  # 10 MB

# OneDrive settings
ONEDRIVE_CLIENT_ID=
ONEDRIVE_CLIENT_SECRET=
ONEDRIVE_REFRESH_TOKEN=
ONEDRIVE_DRIVE_ID=
ONEDRIVE_PATH=/Recordings
ONEDRIVE_CHUNK_SIZE=327680  # 320 KB

# AWS S3 settings
S3_ACCESS_KEY=
S3_SECRET_KEY=
S3_REGION=us-east-1
S3_BUCKET=recording-station
S3_PATH=/
S3_ACL=private  # private, public-read, public-read-write
S3_STORAGE_CLASS=STANDARD  # STANDARD, INTELLIGENT_TIERING, GLACIER

# WebDAV settings
WEBDAV_URL=https://webdav.example.com
WEBDAV_USERNAME=
WEBDAV_PASSWORD=
WEBDAV_PATH=/
WEBDAV_VERIFY_SSL=true

# ============================================================
# WEB SERVER SETTINGS
# ============================================================

WEB_ENABLED=true
WEB_PORT=8080
WEB_HOST=0.0.0.0
WEB_SSL_ENABLED=false
WEB_SSL_CERT=/etc/ssl/certs/recording-station.pem
WEB_SSL_KEY=/etc/ssl/private/recording-station.key
WEB_SSL_CHAIN=/etc/ssl/certs/recording-station-chain.pem

# WebSocket settings
WEBSOCKET_ENABLED=true
WEBSOCKET_PORT=8081
WEBSOCKET_PATH=/ws
WEBSOCKET_MAX_MESSAGE_SIZE=1048576  # 1 MB

# Authentication
AUTH_ENABLED=false
AUTH_TYPE=basic  # basic, token
AUTH_USERNAME=admin
AUTH_PASSWORD_HASH=
AUTH_TOKEN=
AUTH_TOKEN_EXPIRY=86400  # seconds (24 hours)

# CORS settings
CORS_ENABLED=true
CORS_ORIGINS="*"
CORS_METHODS="GET,POST,PUT,DELETE,OPTIONS"
CORS_HEADERS="Content-Type,Authorization"

# ============================================================
# MEMORY MANAGEMENT
# ============================================================

# MMU settings
MMU_ENABLED=true
PAGING_ENABLED=true
MEMORY_PROTECTION_ENABLED=true

# ZRAM settings
ZRAM_ENABLED=true
ZRAM_SIZE=1024  # MB
ZRAM_ALGORITHM=lz4  # lz4, lzo, zstd
ZRAM_PRIORITY=100

# Swapping
SWAPPINESS=80
SWAP_FILE=/swapfile
SWAP_SIZE=1024  # MB
SWAP_AUTO_MOUNT=true

# Memory limits
MAX_MEMORY_USAGE=2048  # MB
MEMORY_WARNING_LEVEL=80  # percentage
MEMORY_PEAK_TRACKING=true

# Cache settings
CACHE_SIZE=256  # MB
CACHE_CLEANUP_INTERVAL=300  # seconds

# ============================================================
# NETWORK SETTINGS
# ============================================================

# Network interface
NETWORK_INTERFACE=eth0
NETWORK_HOSTNAME=recording-station

# DHCP settings
DHCP_ENABLED=true
STATIC_IP=192.168.1.100
STATIC_NETMASK=255.255.255.0
STATIC_GATEWAY=192.168.1.1
STATIC_DNS=8.8.8.8

# Discovery
DISCOVERY_ENABLED=true
DISCOVERY_PORT=5353
DISCOVERY_INTERVAL=60  # seconds
DISCOVERY_TTL=255

# Firewall
FIREWALL_ENABLED=true
FIREWALL_ALLOW_SSH=true
FIREWALL_ALLOW_HTTP=true
FIREWALL_ALLOW_HTTPS=true
FIREWALL_ALLOW_DISCOVERY=true

# ============================================================
# NOTIFICATIONS
# ============================================================

# Email notifications
EMAIL_ENABLED=false
SMTP_HOST=smtp.gmail.com
SMTP_PORT=587
SMTP_SECURITY=starttls  # none, ssl, starttls
SMTP_USERNAME=
SMTP_PASSWORD=
EMAIL_FROM=recording-station@example.com
EMAIL_TO=admin@example.com
EMAIL_ON_RECORDING_START=false
EMAIL_ON_RECORDING_STOP=true
EMAIL_ON_UPLOAD_COMPLETE=true
EMAIL_ON_ERROR=true

# Slack notifications
SLACK_ENABLED=false
SLACK_WEBHOOK_URL=
SLACK_CHANNEL=#recordings
SLACK_USERNAME=Recording Station
SLACK_ICON_EMOJI=:video_camera:

# Discord notifications
DISCORD_ENABLED=false
DISCORD_WEBHOOK_URL=
DISCORD_USERNAME=Recording Station

# Push notifications (Pushover)
PUSHOVER_ENABLED=false
PUSHOVER_USER_KEY=
PUSHOVER_APP_TOKEN=
PUSHOVER_PRIORITY=0  # -2=lowest, -1=low, 0=normal, 1=high

# SMS notifications (Twilio)
SMS_ENABLED=false
TWILIO_ACCOUNT_SID=
TWILIO_AUTH_TOKEN=
TWILIO_FROM_NUMBER=
SMS_TO_NUMBER=

# ============================================================
# SECURITY
# ============================================================

# Encryption
ENCRYPTION_ENABLED=false
ENCRYPTION_ALGORITHM=aes-256-gcm
ENCRYPTION_KEY_PATH=/etc/recording-station/encryption.key
ENCRYPTION_PASSWORD=

# TLS settings
TLS_MIN_VERSION=TLSv1.2
TLS_MAX_VERSION=TLSv1.3
TLS_CIPHER_SUITES="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"

# Password policy
PASSWORD_MIN_LENGTH=12
PASSWORD_REQUIRE_SPECIAL=true
PASSWORD_REQUIRE_UPPER=true
PASSWORD_REQUIRE_LOWER=true
PASSWORD_REQUIRE_NUMBER=true
PASSWORD_EXPIRY_DAYS=90

# Session management
SESSION_TIMEOUT=3600  # seconds
SESSION_MAX_CONCURRENT=3
SESSION_IP_VALIDATION=false

# Audit logging
AUDIT_ENABLED=true
AUDIT_LOG_FILE=/var/log/recording-station/audit.log
AUDIT_LOG_LEVEL=info
AUDIT_RETENTION_DAYS=365

# ============================================================
# DEVELOPMENT & DEBUG
# ============================================================

# Debug mode
DEBUG_MODE=false
DEBUG_LEVEL=info
DEBUG_CONSOLE=true

# Profiling
ENABLE_PROFILING=false
PROFILE_OUTPUT=/var/lib/recording-station/profiles/
PROFILE_INTERVAL=60  # seconds

# Test mode
TEST_MODE=false
TEST_DATA_DIR=/tmp/recording-station-test
TEST_SKIP_HARDWARE=true
TEST_USE_MOCK=true

# Development tools
ENABLE_REMOTE_DEBUGGING=false
REMOTE_DEBUG_PORT=2345
ENABLE_DEV_TOOLS=false
DEV_TOOLS_SECRET=

# API testing
API_TEST_ENABLED=false
API_TEST_AUTO_RUN=false
API_TEST_REPORT=/var/lib/recording-station/test-report.json

# ============================================================
# ADVANCED SETTINGS
# ============================================================

# Performance tuning
IO_PRIORITY=best-effort
CPU_AFFINITY=0-3
NICE_LEVEL=-10
REALTIME_PRIORITY=80

# Buffer settings
VIDEO_BUFFER_SIZE=10485760  # 10 MB
AUDIO_BUFFER_SIZE=1048576   # 1 MB
NETWORK_BUFFER_SIZE=1048576  # 1 MB

# Thread settings
THREAD_POOL_SIZE=4
IO_THREAD_POOL_SIZE=2
NETWORK_THREAD_POOL_SIZE=2

# Watchdog
WATCHDOG_ENABLED=true
WATCHDOG_TIMEOUT=60  # seconds
WATCHDOG_ACTION=restart  # restart, shutdown, none

# Health checks
HEALTH_CHECK_ENABLED=true
HEALTH_CHECK_INTERVAL=30  # seconds
HEALTH_CHECK_TIMEOUT=5  # seconds
HEALTH_CHECK_ENDPOINT=/health

# Rate limiting
RATE_LIMIT_ENABLED=false
RATE_LIMIT_REQUESTS=100
RATE_LIMIT_PERIOD=60  # seconds
RATE_LIMIT_BURST=50

# ============================================================
# END OF CONFIGURATION
# ============================================================
