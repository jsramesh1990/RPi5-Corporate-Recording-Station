# ============================================================
# Grafana Configuration
# RPi5 Corporate Recording Station
# ============================================================

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins

[server]
protocol = http
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = http://localhost:3000

[database]
type = sqlite3
path = /var/lib/grafana/grafana.db

[security]
admin_user = admin
admin_password = admin

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

[auth.basic]
enabled = true

[auth.ldap]
enabled = false

[session]
provider = file
provider_config = sessions

[log]
mode = console file
level = info

[log.console]
level = info

[log.file]
level = info
format = text
log_rotate = true
daily_rotate = true
max_days = 7

[analytics]
reporting_enabled = false
check_for_updates = false

[alerting]
enabled = true
execute_alerts = true

[metrics]
enabled = true
interval_seconds = 10

[metrics.graphite]
address = localhost:2003
prefix = prod.grafana

[snapshots]
external_enabled = false

[plugins]
enable_alpha = false
app_tls_skip_verify_insecure = false

[rendering]
server_url = http://localhost:8081/render
callback_url = http://localhost:3000/

[panels]
enable_alpha = false
