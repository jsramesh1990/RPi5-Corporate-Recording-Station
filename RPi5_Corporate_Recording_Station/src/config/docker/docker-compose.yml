# ============================================================
# Docker Compose for RPi5 Corporate Recording Station
# Raspberry Pi 5 (ARM64) Optimized
# ============================================================
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f        # View logs
#   docker-compose ps             # Check status
#
# ============================================================

version: '3.8'

# ============================================================
# NETWORKS
# ============================================================

networks:
  recording-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================
# VOLUMES
# ============================================================

volumes:
  # Recording data
  recordings_data:
    driver: local
    driver_opts:
      type: none
      device: /var/lib/recording-station
      o: bind
  
  # Configuration
  config_data:
    driver: local
    driver_opts:
      type: none
      device: /etc/recording-station
      o: bind
  
  # Logs
  logs_data:
    driver: local
    driver_opts:
      type: none
      device: /var/log/recording-station
      o: bind
  
  # Database
  postgres_data:
    driver: local
  
  # Redis cache
  redis_data:
    driver: local
  
  # Nextcloud data
  nextcloud_data:
    driver: local
  nextcloud_apps:
    driver: local
  nextcloud_config:
    driver: local
  
  # Monitoring
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================================
# SERVICES
# ============================================================

services:
  # ==========================================================
  # MAIN RECORDING STATION APPLICATION
  # ==========================================================
  
  recording-station:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: Release
        PLATFORM: linux/arm64
    image: recording-station:latest
    container_name: recording-station
    restart: unless-stopped
    
    # Network configuration
    network_mode: host
    # ports:
    #   - "8080:8080"   # Web UI
    #   - "8081:8081"   # WebSocket
    
    # Privileged mode for hardware access
    privileged: true
    
    # Environment variables
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
      - DATA_DIR=/var/lib/recording-station
      - CONFIG_DIR=/etc/recording-station
      - ENVIRONMENT=production
    
    # Volume mounts
    volumes:
      # Data
      - recordings_data:/var/lib/recording-station
      
      # Configuration
      - config_data:/etc/recording-station:ro
      
      # Logs
      - logs_data:/var/log/recording-station
      
      # Hardware access
      - /dev:/dev
      - /sys:/sys
      - /proc:/proc
      - /run:/run
      
      # GPIO (if using GPIO pins)
      - /sys/class/gpio:/sys/class/gpio
      
      # UART
      - /dev/ttyAMA0:/dev/ttyAMA0
      - /dev/ttyAMA10:/dev/ttyAMA10
      
      # Camera
      - /dev/video0:/dev/video0
      - /dev/vchiq:/dev/vchiq
      
      # Audio
      - /dev/snd:/dev/snd
      
      # D-Bus (for systemd integration)
      - /run/dbus:/run/dbus
      - /run/systemd:/run/systemd
    
    # Device access
    devices:
      - /dev/ttyAMA0:/dev/ttyAMA0
      - /dev/ttyAMA10:/dev/ttyAMA10
      - /dev/video0:/dev/video0
      - /dev/vchiq:/dev/vchiq
      - /dev/snd:/dev/snd
      - /dev/mem:/dev/mem
      - /dev/gpiomem:/dev/gpiomem
    
    # Capabilities
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
      - SYS_TIME
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - DAC_READ_SEARCH
    
    # Security options
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 512M
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Labels
    labels:
      - "com.recording-station.version=2.0.0"
      - "com.recording-station.description=Corporate Recording Station"
    
    # Dependencies
    depends_on:
      - redis
      - postgres

  # ==========================================================
  # POSTGRESQL DATABASE
  # ==========================================================
  
  postgres:
    image: postgres:16-alpine
    container_name: recording-postgres
    restart: unless-stopped
    
    environment:
      - POSTGRES_USER=recording
      - POSTGRES_PASSWORD=recording_password
      - POSTGRES_DB=recording_station
      - PGDATA=/var/lib/postgresql/data/pgdata
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    
    ports:
      - "5432:5432"
    
    networks:
      - recording-network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recording"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    deploy:
      resources:
        limits:
          memory: 512M
    
    labels:
      - "com.recording-station.service=postgres"

  # ==========================================================
  # REDIS CACHE
  # ==========================================================
  
  redis:
    image: redis:7-alpine
    container_name: recording-redis
    restart: unless-stopped
    
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    
    volumes:
      - redis_data:/data
    
    ports:
      - "6379:6379"
    
    networks:
      - recording-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================
  # NEXTCLOUD (CLOUD STORAGE)
  # ==========================================================
  
  nextcloud:
    image: nextcloud:28-fpm-alpine
    container_name: recording-nextcloud
    restart: unless-stopped
    
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_password
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin_password
      - NEXTCLOUD_DATA_DIR=/var/www/html/data
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TRUSTED_PROXIES=172.20.0.0/16
      - OVERWRITEPROTOCOL=https
    
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_apps:/var/www/html/custom_apps
      - nextcloud_config:/var/www/html/config
    
    depends_on:
      - postgres
      - redis
    
    networks:
      - recording-network
    
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================================
  # NEXTCLOUD NGINX (WEB SERVER)
  # ==========================================================
  
  nextcloud-web:
    image: nginx:alpine
    container_name: recording-nextcloud-web
    restart: unless-stopped
    
    volumes:
      - nextcloud_data:/var/www/html:ro
      - nextcloud_apps:/var/www/html/custom_apps:ro
      - nextcloud_config:/var/www/html/config:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl/nextcloud:ro
    
    ports:
      - "443:443"
      - "80:80"
    
    depends_on:
      - nextcloud
    
    networks:
      - recording-network
    
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================
  # PROMETHEUS (MONITORING)
  # ==========================================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: recording-prometheus
    restart: unless-stopped
    
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    
    ports:
      - "9090:9090"
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    
    networks:
      - recording-network
    
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================================
  # GRAFANA (VISUALIZATION)
  # ==========================================================
  
  grafana:
    image: grafana/grafana:latest
    container_name: recording-grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_DOMAIN=localhost
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana.ini:/etc/grafana/grafana.ini:ro
      - ./dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./datasources:/etc/grafana/provisioning/datasources:ro
    
    ports:
      - "3000:3000"
    
    depends_on:
      - prometheus
    
    networks:
      - recording-network
    
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================================
  # PORTAINER (DOCKER MANAGEMENT)
  # ==========================================================
  
  portainer:
    image: portainer/portainer-ce:latest
    container_name: recording-portainer
    restart: unless-stopped
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    
    ports:
      - "9000:9000"
    
    networks:
      - recording-network

# ============================================================
# END OF DOCKER COMPOSE
# ============================================================
