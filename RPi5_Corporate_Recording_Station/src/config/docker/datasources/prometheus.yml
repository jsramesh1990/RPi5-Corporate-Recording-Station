# ============================================================
# Grafana Datasource: Prometheus
# RPi5 Corporate Recording Station
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST
      manageAlerts: true
    version: 1
