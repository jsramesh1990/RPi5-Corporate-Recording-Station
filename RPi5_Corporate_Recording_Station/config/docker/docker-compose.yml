# Docker Compose for RPi5 Recording Station
# Raspberry Pi 5 (ARM64) optimized

version: '3.8'

services:
  # Main recording station application
  recording-station:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        - BUILD_TYPE=Release
    image: recording-station:latest
    container_name: recording-station
    restart: unless-stopped
    privileged: true  # Required for GPIO and hardware access
    network_mode: host  # For UART and network access
    
    volumes:
      # Data volumes
      - /var/lib/recording-station:/var/lib/recording-station
      - /var/log/recording-station:/var/log/recording-station
      
      # Hardware access
      - /dev:/dev
      - /sys:/sys
      
      # Config
      - ../app/recording-station.conf:/etc/recording-station/recording-station.conf:ro
      - ../app/logging.conf:/etc/recording-station/logging.conf:ro
      - .env:/etc/recording-station/.env:ro
      
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
    devices:
      - /dev/ttyAMA0
      - /dev/video0
      - /dev/snd
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    
  # Nextcloud for cloud storage
  nextcloud:
    image: nextcloud:28-fpm-alpine
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_password
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin_password
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_apps:/var/www/html/custom_apps
      - nextcloud_config:/var/www/html/config
    depends_on:
      - postgres
      - redis
    
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    
  # Nginx web server for Nextcloud
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - nextcloud_data:/var/www/html
      - nextcloud_apps:/var/www/html/custom_apps
      - nextcloud_config:/var/www/html/config
      - ssl_certs:/etc/ssl/certs
    depends_on:
      - nextcloud
    
  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    
  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana.ini:/etc/grafana/grafana.ini:ro
      - ./dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

volumes:
  nextcloud_data:
  nextcloud_apps:
  nextcloud_config:
  postgres_data:
  redis_data:
  ssl_certs:
  prometheus_data:
  grafana_data:

networks:
  default:
    driver: bridge
