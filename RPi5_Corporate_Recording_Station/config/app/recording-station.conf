# RPi5 Corporate Recording Station - Main Configuration
# Format: KEY=VALUE

# ============================================
# SYSTEM SETTINGS
# ============================================

# System name
SYSTEM_NAME=Recording Station
SYSTEM_HOSTNAME=recording-station

# Data directory
DATA_DIR=/var/lib/recording-station
RECORDINGS_DIR=/var/lib/recording-station/recordings
ARCHIVE_DIR=/var/lib/recording-station/archive
TEMP_DIR=/var/lib/recording-station/temp
METADATA_DIR=/var/lib/recording-station/metadata

# Log directory
LOG_DIR=/var/log/recording-station
LOG_LEVEL=info  # debug, info, warn, error

# ============================================
# RECORDING SETTINGS
# ============================================

# Video settings
VIDEO_ENABLED=true
VIDEO_WIDTH=1920
VIDEO_HEIGHT=1080
VIDEO_FRAMERATE=30
VIDEO_BITRATE=4000000  # 4 Mbps
VIDEO_CODEC=h264       # h264, h265, mjpeg
VIDEO_FORMAT=mp4       # mp4, mkv, avi

# Audio settings
AUDIO_ENABLED=true
AUDIO_SAMPLE_RATE=48000
AUDIO_CHANNELS=2
AUDIO_BITRATE=128000   # 128 Kbps
AUDIO_CODEC=aac        # aac, mp3, opus
AUDIO_FORMAT=wav       # wav, mp3, flac

# Recording limits
MAX_RECORDING_TIME=3600  # seconds (1 hour)
MAX_FILE_SIZE=4000000000  # 4 GB
AUTO_RECORD=true
AUTO_STOP=true

# Storage limits
MIN_FREE_SPACE=10737418240  # 10 GB
STORAGE_WARNING_LEVEL=85    # percentage

# ============================================
# HARDWARE SETTINGS
# ============================================

# Camera device
CAMERA_DEVICE=/dev/video0
CAMERA_INTERFACE=csi  # csi, usb, hdmi

# Audio device
AUDIO_DEVICE=hw:0,0
AUDIO_INTERFACE=alsa  # alsa, pulse

# UART settings
UART_DEVICE=/dev/ttyAMA0
UART_BAUD=115200
UART_ENABLED=true

# GPIO pins
GPIO_LED_SYSTEM=17
GPIO_LED_RECORDING=27
GPIO_BUTTON_START=22
GPIO_BUTTON_STOP=23

# ============================================
# CLOUD SETTINGS
# ============================================

# Cloud provider (nextcloud, onedrive, s3, webdav)
CLOUD_PROVIDER=nextcloud
CLOUD_ENABLED=true
CLOUD_AUTO_UPLOAD=true

# Nextcloud settings
NEXTCLOUD_URL=https://nextcloud.example.com
NEXTCLOUD_USERNAME=recording_station
NEXTCLOUD_PASSWORD=your_password_here
NEXTCLOUD_PATH=/Recordings

# OneDrive settings
ONEDRIVE_CLIENT_ID=your_client_id
ONEDRIVE_CLIENT_SECRET=your_client_secret
ONEDRIVE_REFRESH_TOKEN=your_refresh_token

# AWS S3 settings
AWS_ACCESS_KEY=your_access_key
AWS_SECRET_KEY=your_secret_key
AWS_REGION=us-east-1
AWS_BUCKET=recording-station

# WebDAV settings
WEBDAV_URL=https://webdav.example.com
WEBDAV_USERNAME=username
WEBDAV_PASSWORD=password

# ============================================
# WEB SERVER SETTINGS
# ============================================

WEB_ENABLED=true
WEB_PORT=8080
WEB_HOST=0.0.0.0
WEB_SSL_ENABLED=false
WEB_SSL_CERT=/etc/ssl/certs/recording-station.pem
WEB_SSL_KEY=/etc/ssl/private/recording-station.key

# WebSocket settings
WEBSOCKET_ENABLED=true
WEBSOCKET_PORT=8081

# Authentication
AUTH_ENABLED=false
AUTH_USERNAME=admin
AUTH_PASSWORD=admin_password_hash_here

# ============================================
# MEMORY MANAGEMENT
# ============================================

# MMU settings
MMU_ENABLED=true
PAGING_ENABLED=true
ZRAM_ENABLED=true
ZRAM_SIZE=1024  # MB

# Swappiness (0-100)
SWAPPINESS=80

# Memory limits
MAX_MEMORY_USAGE=2048  # MB
MEMORY_WARNING_LEVEL=80  # percentage

# ============================================
# NETWORK SETTINGS
# ============================================

# Network interface
NETWORK_INTERFACE=eth0

# Multicast discovery
DISCOVERY_ENABLED=true
DISCOVERY_PORT=5353

# ============================================
# NOTIFICATIONS
# ============================================

# Email notifications
EMAIL_ENABLED=false
SMTP_HOST=smtp.gmail.com
SMTP_PORT=587
SMTP_USERNAME=your_email@gmail.com
SMTP_PASSWORD=your_app_password
EMAIL_TO=admin@example.com
EMAIL_FROM=recording-station@example.com

# Slack notifications
SLACK_ENABLED=false
SLACK_WEBHOOK_URL=https://hooks.slack.com/services/your/webhook/url

# ============================================
# SECURITY
# ============================================

# Encryption
ENCRYPTION_ENABLED=true
ENCRYPTION_ALGORITHM=aes-256-gcm
ENCRYPTION_KEY=/etc/recording-station/encryption.key

# TLS settings
TLS_MIN_VERSION=1.2

# ============================================
# DEVELOPMENT
# ============================================

# Debug mode
DEBUG_MODE=false
ENABLE_PROFILING=false

# Test mode (for development)
TEST_MODE=false
