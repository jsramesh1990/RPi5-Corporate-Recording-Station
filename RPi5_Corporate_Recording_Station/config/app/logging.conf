# Logging Configuration
# RPi5 Corporate Recording Station

# ============================================
# GLOBAL SETTINGS
# ============================================

# Log levels: TRACE, DEBUG, INFO, WARN, ERROR, FATAL
global.log_level=INFO
global.log_format=%Y-%m-%d %H:%M:%S.%f [%l] %n: %v

# ============================================
# CONSOLE LOGGING
# ============================================

console.enabled=true
console.log_level=INFO
console.color.enabled=true
console.color.level_INFO=green
console.color.level_WARN=yellow
console.color.level_ERROR=red
console.color.level_FATAL=red,bold

# ============================================
# FILE LOGGING
# ============================================

file.enabled=true
file.log_level=DEBUG
file.path=/var/log/recording-station/recording-station.log
file.max_size=10485760  # 10 MB
file.max_files=5
file.rotation_type=size  # size, time

# Time-based rotation
file.rotation_time=midnight
file.rotation_day=0  # 0=Sunday

# ============================================
# SYSLOG LOGGING
# ============================================

syslog.enabled=false
syslog.log_level=INFO
syslog.ident=recording-station
syslog.facility=local0
syslog.host=localhost
syslog.port=514

# ============================================
# COMPONENT-SPECIFIC LOGGING
# ============================================

# Core components
core.log_level=INFO
core.hardware.log_level=WARN
core.memory.log_level=INFO
core.storage.log_level=INFO

# Recording components
recording.log_level=INFO
recording.video.log_level=DEBUG
recording.audio.log_level=DEBUG

# Cloud components
cloud.log_level=INFO
cloud.upload.log_level=INFO
cloud.sync.log_level=DEBUG

# UI components
ui.log_level=INFO
ui.web.log_level=INFO
ui.dashboard.log_level=INFO

# Network components
network.log_level=INFO
network.uart.log_level=INFO
network.websocket.log_level=WARN

# ============================================
# PERFORMANCE LOGGING
# ============================================

performance.enabled=true
performance.interval=60  # seconds
performance.log_level=INFO
performance.include_cpu=true
performance.include_memory=true
performance.include_disk=true
performance.include_network=true

# ============================================
# AUDIT LOGGING
# ============================================

audit.enabled=true
audit.log_level=INFO
audit.path=/var/log/recording-station/audit.log
audit.include_commands=true
audit.include_login=true
audit.include_file_access=true

# ============================================
# ERROR LOGGING
# ============================================

error.enabled=true
error.log_level=ERROR
error.path=/var/log/recording-station/error.log
error.backtrace=true
error.symbolize=true

# ============================================
# REMOTE LOGGING
# ============================================

remote.enabled=false
remote.host=logs.example.com
remote.port=514
remote.protocol=tcp
remote.format=syslog

# ============================================
# MONITORING
# ============================================

monitor.enabled=true
monitor.interval=60  # seconds
monitor.log_level=INFO
monitor.metrics_path=/var/lib/recording-station/metrics
